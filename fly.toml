# Fly.io deploy config. Rename `app` to something globally unique, then:
#   fly launch --copy-config --no-deploy   (creates the app)
#   fly secrets set APP_PASS=... ANTHROPIC_API_KEY=...   (login + optional Explain)
#   fly deploy
app = "bridge-mc-sim"
primary_region = "lhr"          # pick your nearest: iad, ord, ams, syd, ...

[build]

[env]
  MAX_DEALS = "8000"            # per-request deal cap (guards CPU)
  RUN_TIMEOUT = "120"           # seconds before a run is abandoned

[http_service]
  internal_port = 8080
  force_https = true
  # Scale to zero when idle (pennies); wakes on the next request in ~2-3s.
  # For zero cold-start ("truly always on"), set min_machines_running = 1.
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  cpu_kind = "shared"
  cpus = 2
  memory = "1gb"

[checks.health]
  type = "http"
  port = 8080
  path = "/healthz"
  interval = "30s"
  timeout = "5s"
  grace_period = "20s"
