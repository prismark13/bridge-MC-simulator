name: build

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write               # allow the release step to upload assets

jobs:
  build:
    strategy:
      fail-fast: false          # one OS failing shouldn't block the others
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Linux DDS runtime library
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgomp1

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip pyinstaller anthropic PySide6
          python -m pip install "git+https://github.com/anntzer/redeal"

      - name: Build standalone app
        # One-folder (not --onefile): QtWebEngine ships a Chromium helper +
        # resources that are unreliable when unpacked from a temp dir each launch.
        run: >
          pyinstaller --noconfirm --onedir --windowed --name BridgeMCSimulator
          --collect-all redeal --collect-all anthropic --collect-all PySide6
          --collect-data bridge_mc bridge_sim_gui.py

      - name: Package the one-folder app
        shell: bash
        run: |
          mkdir -p out
          python - <<'PY'
          import platform, shutil
          osname = {"Windows": "windows", "Darwin": "macos", "Linux": "linux"}[platform.system()]
          shutil.make_archive(f"out/BridgeMCSimulator-{osname}", "zip", "dist")
          PY

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: BridgeMCSimulator-${{ runner.os }}
          path: out/*

      - name: Attach to GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Bridge MC Simulator ${{ github.ref_name }}
          generate_release_notes: true
          files: out/*
